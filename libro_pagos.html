<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEB NYC — Libro de pagos</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f5f5f0;color:#1a1a1a}
.topbar{background:#004225;color:white;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.topbar h1{font-size:16px;font-weight:500}
.topbar-links{display:flex;gap:8px}
.topbar-links a{color:white;font-size:12px;opacity:.8;text-decoration:none;padding:5px 10px;border:0.5px solid rgba(255,255,255,.3);border-radius:6px}
.topbar-links a:hover{opacity:1;background:rgba(255,255,255,.1)}
.container{max-width:1300px;margin:0 auto;padding:24px}
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.metric{background:white;border-radius:10px;padding:14px 16px;border:0.5px solid #e0e0d8}
.metric-label{font-size:11px;color:#888;margin-bottom:5px}
.metric-value{font-size:20px;font-weight:500}
.green{color:#27500A}.red{color:#791F1F}.amber{color:#633806}.blue{color:#0C447C}
.card{background:white;border-radius:10px;border:0.5px solid #e0e0d8;margin-bottom:16px}
.card-header{padding:14px 20px;border-bottom:0.5px solid #e0e0d8;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.card-header h2{font-size:14px;font-weight:500}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
select,input[type=text],input[type=date]{padding:7px 10px;border:0.5px solid #d0d0c8;border-radius:6px;font-size:13px;background:white;color:#1a1a1a;outline:none}
select:focus,input:focus{border-color:#004225}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:#f8f8f5;padding:9px 12px;text-align:left;font-size:11px;font-weight:500;color:#666;border-bottom:0.5px solid #e0e0d8;white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;z-index:1}
th:hover{background:#f0f0e8}
th.asc::after{content:' ↑'}
th.desc::after{content:' ↓'}
td{padding:9px 12px;border-bottom:0.5px solid #f0f0e8;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf7}
tr.total-row td{font-weight:600;background:#f8f8f5;border-top:1px solid #e0e0d8}
.pill{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.pill-green{background:#EAF3DE;color:#27500A}
.pill-teal{background:#E1F5EE;color:#085041}
.pill-blue{background:#E6F1FB;color:#0C447C}
.pill-purple{background:#EEEDFE;color:#3C3489}
.pill-amber{background:#FAEEDA;color:#633806}
.pill-gray{background:#F1EFE8;color:#444}
.btn{padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:0.5px solid #d0d0c8;background:white;color:#1a1a1a}
.btn:hover{background:#f5f5f0}
.btn-primary{background:#004225;color:white;border-color:#004225}
.btn-primary:hover{background:#003018}
.btn-success{background:#27500A;color:white;border-color:#27500A}
.btn-success:hover{background:#1e3d07}
.btn-sm{padding:4px 10px;font-size:12px}
.loading{text-align:center;padding:40px;color:#888;font-size:14px}
.realizado-check{width:16px;height:16px;cursor:pointer;accent-color:#004225}
.grupo-header{background:#E6F1FB;padding:8px 14px;font-size:12px;font-weight:500;color:#0C447C;border-bottom:0.5px solid #B5D4F4;display:flex;justify-content:space-between}
.totales-bar{padding:12px 20px;border-top:0.5px solid #e0e0d8;background:#f8f8f5;display:flex;gap:20px;font-size:13px;flex-wrap:wrap;align-items:center}
.totales-bar b{font-weight:600}
</style>
</head>
<body>
<div class="topbar">
  <h1>TEB NYC — Libro de pagos</h1>
  <div class="topbar-links">
    <a href="panel_teb_v5.html">← Panel principal</a>
    <a href="importar_pagos.html">↑ Importar pagos</a>
    <a href="formulario_alumno.html">+ Nuevo alumno</a>
  </div>
</div>

<div class="container">
  <div id="alert-global"></div>

  <div class="metrics">
    <div class="metric"><div class="metric-label">Pagos en vista</div><div class="metric-value" id="m-total">—</div></div>
    <div class="metric"><div class="metric-label">Total USD</div><div class="metric-value green" id="m-usd">—</div></div>
    <div class="metric"><div class="metric-label">Stripe</div><div class="metric-value blue" id="m-stripe">—</div></div>
    <div class="metric"><div class="metric-label">Transferencia</div><div class="metric-value amber" id="m-trans">—</div></div>
    <div class="metric"><div class="metric-label">Realizados ✓</div><div class="metric-value green" id="m-real">—</div></div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Filtros</h2>
      <div class="filters">
        <input type="text" id="f-alumno" placeholder="Buscar alumno..." oninput="filtrar()" style="width:180px">
        <select id="f-metodo" onchange="filtrar()">
          <option value="">Todos los métodos</option>
          <option>Stripe</option><option>Transferencia</option>
          <option>MercadoPago</option><option>BOFA</option>
          <option>Efectivo</option><option>Otro</option>
        </select>
        <select id="f-quien" onchange="filtrar()">
          <option value="">Todos los receptores</option>
        </select>
        <select id="f-edicion" onchange="filtrar()">
          <option value="">Todas las ediciones</option>
        </select>
        <select id="f-realizado" onchange="filtrar()">
          <option value="">Todos</option>
          <option value="si">Solo realizados ✓</option>
          <option value="no">Solo pendientes</option>
        </select>
      </div>
    </div>
    <div class="card-header" style="border-top:none;padding-top:8px;padding-bottom:10px">
      <div class="filters">
        <label style="font-size:12px;color:#666">Desde:</label>
        <input type="date" id="f-desde" onchange="filtrar()">
        <label style="font-size:12px;color:#666">Hasta:</label>
        <input type="date" id="f-hasta" onchange="filtrar()">
        <select id="f-agrupar" onchange="filtrar()">
          <option value="">Sin agrupar</option>
          <option value="mes">Por mes</option>
          <option value="metodo">Por método de pago</option>
          <option value="quien">Por quién recibió</option>
          <option value="edicion">Por edición</option>
        </select>
        <button class="btn btn-sm" onclick="limpiarFiltros()">✕ Limpiar</button>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-success btn-sm" onclick="exportarExcel()">⬇ Excel</button>
        <button class="btn btn-sm" onclick="exportarCSV()">⬇ CSV</button>
      </div>
    </div>

    <div style="max-height:65vh;overflow-y:auto" id="tabla-wrap">
      <div id="tabla-container"><div class="loading">Cargando pagos...</div></div>
    </div>
    <div class="totales-bar" id="totales-bar" style="display:none"></div>
  </div>
</div>

<script>
const SURL='https://sjlaccqognqxubjeweah.supabase.co';
const SKEY='sb_publishable_C5hjAFL3IHUfkbS-sug89g_Hu3MjmDP';
const {createClient}=supabase;
const db=createClient(SURL,SKEY);

let TODOS=[],FILTRADOS=[],EDS=[];
let sortCol='fecha',sortDir='desc';

function usd(n){return 'USD '+Math.round(n||0).toLocaleString('es-AR');}
function usd2(n){return 'USD '+Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function metodoColor(m){
  const map={'Stripe':'blue','Transferencia':'teal','BOFA':'purple','MercadoPago':'amber','Efectivo':'green','Otro':'gray'};
  return map[m]||'gray';
}
function formatMes(ym){
  if(!ym||ym==='Sin fecha')return'Sin fecha';
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const [y,m]=ym.split('-');
  return meses[parseInt(m)-1]+' '+y;
}

async function init(){
  // Ediciones
  const {data:eds}=await db.from('ediciones').select('*').order('fecha_inicio');
  EDS=eds||[];
  const selEd=document.getElementById('f-edicion');
  EDS.forEach(e=>{const o=document.createElement('option');o.value=e.id;o.textContent=e.nombre;selEd.appendChild(o);});

  // Pagos con alumno y edición
  const {data:pagos,error}=await db.from('pagos')
    .select('*, alumnos(id,nombre,edicion_id,ediciones(nombre))')
    .order('fecha',{ascending:false});

  if(error){
    document.getElementById('tabla-container').innerHTML=`<div class="loading">Error: ${error.message}</div>`;
    return;
  }
  TODOS=pagos||[];

  // Poblar selector quien
  const quienes=[...new Set(TODOS.map(p=>p.quien_recibio).filter(Boolean))].sort();
  const selQ=document.getElementById('f-quien');
  quienes.forEach(q=>{const o=document.createElement('option');o.value=q;o.textContent=q;selQ.appendChild(o);});

  // Fechas por defecto: último mes
  const hoy=new Date();
  const hace30=new Date(hoy);hace30.setDate(hace30.getDate()-30);
  document.getElementById('f-desde').value=hace30.toISOString().split('T')[0];
  document.getElementById('f-hasta').value=hoy.toISOString().split('T')[0];

  filtrar();
}

function filtrar(){
  const alumno=document.getElementById('f-alumno').value.toLowerCase();
  const metodo=document.getElementById('f-metodo').value;
  const quien=document.getElementById('f-quien').value;
  const edicion=document.getElementById('f-edicion').value;
  const realizado=document.getElementById('f-realizado').value;
  const desde=document.getElementById('f-desde').value;
  const hasta=document.getElementById('f-hasta').value;

  FILTRADOS=TODOS.filter(p=>{
    if(alumno&&!(p.alumnos?.nombre||'').toLowerCase().includes(alumno))return false;
    if(metodo&&p.metodo!==metodo)return false;
    if(quien&&p.quien_recibio!==quien)return false;
    if(edicion&&p.alumnos?.edicion_id!==edicion)return false;
    if(realizado==='si'&&!p.realizado)return false;
    if(realizado==='no'&&p.realizado)return false;
    if(desde&&p.fecha&&p.fecha<desde)return false;
    if(hasta&&p.fecha&&p.fecha>hasta)return false;
    return true;
  });

  // Ordenar
  FILTRADOS.sort((a,b)=>{
    let va=sortCol==='alumno'?(a.alumnos?.nombre??''):(a[sortCol]??'');
    let vb=sortCol==='alumno'?(b.alumnos?.nombre??''):(b[sortCol]??'');
    if(sortCol==='monto'){va=a.monto||0;vb=b.monto||0;}
    if(typeof va==='string')return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    return sortDir==='asc'?va-vb:vb-va;
  });

  actualizarMetricas();
  const agrupar=document.getElementById('f-agrupar').value;
  agrupar?renderAgrupado(agrupar):renderTabla();
}

function actualizarMetricas(){
  const total=FILTRADOS.reduce((s,p)=>s+(p.monto||0),0);
  const stripe=FILTRADOS.filter(p=>p.metodo==='Stripe').reduce((s,p)=>s+(p.monto||0),0);
  const trans=FILTRADOS.filter(p=>p.metodo==='Transferencia').reduce((s,p)=>s+(p.monto||0),0);
  const real=FILTRADOS.filter(p=>p.realizado).length;
  document.getElementById('m-total').textContent=FILTRADOS.length+' pagos';
  document.getElementById('m-usd').textContent=usd2(total);
  document.getElementById('m-stripe').textContent=usd(stripe);
  document.getElementById('m-trans').textContent=usd(trans);
  document.getElementById('m-real').textContent=real+' / '+FILTRADOS.length;
}

function thCol(col,label){
  const cls=sortCol===col?sortDir:'';
  return `<th class="${cls}" onclick="sortBy('${col}')">${label}</th>`;
}

function renderTabla(){
  if(!FILTRADOS.length){
    document.getElementById('tabla-container').innerHTML='<div class="loading">Sin resultados con los filtros aplicados.</div>';
    document.getElementById('totales-bar').style.display='none';
    return;
  }
  let h=`<table><thead><tr>
    ${thCol('fecha','Fecha')}
    ${thCol('alumno','Alumno')}
    <th>Edición</th>
    ${thCol('monto','Monto USD')}
    <th>Notas / ARS</th>
    ${thCol('metodo','Método')}
    ${thCol('cuota','Cuota')}
    ${thCol('quien_recibio','Quién recibió')}
    <th>Realizado ✓</th>
  </tr></thead><tbody>`;

  const tot=FILTRADOS.reduce((s,p)=>s+(p.monto||0),0);
  FILTRADOS.forEach(p=>{
    const edNombre=p.alumnos?.ediciones?.nombre||'—';
    h+=`<tr>
      <td style="color:#666;white-space:nowrap">${p.fecha||'—'}</td>
      <td style="font-weight:500">${p.alumnos?.nombre||'—'}</td>
      <td><span class="pill pill-gray" style="font-size:10px">${edNombre}</span></td>
      <td style="font-weight:500;color:#27500A">${usd2(p.monto)}</td>
      <td style="font-size:11px;color:#888;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.notas||''}</td>
      <td><span class="pill pill-${metodoColor(p.metodo)}">${p.metodo||'—'}</span></td>
      <td style="color:#888;text-align:center">${p.cuota||'—'}</td>
      <td style="color:#666">${p.quien_recibio||'—'}</td>
      <td style="text-align:center">
        <input type="checkbox" class="realizado-check" ${p.realizado?'checked':''} onchange="toggleRealizado('${p.id}',this.checked)">
      </td>
    </tr>`;
  });

  h+=`<tr class="total-row">
    <td colspan="3" style="text-align:right;color:#888;font-size:11px">TOTAL — ${FILTRADOS.length} pagos</td>
    <td style="color:#27500A">${usd2(tot)}</td>
    <td colspan="5"></td>
  </tr></tbody></table>`;

  document.getElementById('tabla-container').innerHTML=h;

  // Barra totales por método
  const porMetodo={};
  FILTRADOS.forEach(p=>{porMetodo[p.metodo||'Otro']=(porMetodo[p.metodo||'Otro']||0)+(p.monto||0);});
  let barH='<span style="font-weight:500;color:#444;margin-right:4px">Totales:</span>';
  Object.entries(porMetodo).sort((a,b)=>b[1]-a[1]).forEach(([m,v])=>{
    barH+=`<span><span class="pill pill-${metodoColor(m)}" style="margin-right:4px">${m}</span><b>${usd2(v)}</b></span>`;
  });
  // Por quién recibió
  const porQuien={};
  FILTRADOS.forEach(p=>{if(p.quien_recibio)porQuien[p.quien_recibio]=(porQuien[p.quien_recibio]||0)+(p.monto||0);});
  if(Object.keys(porQuien).length>0){
    barH+='<span style="margin-left:12px;color:#aaa">|</span>';
    Object.entries(porQuien).sort((a,b)=>b[1]-a[1]).forEach(([q,v])=>{
      barH+=`<span style="color:#666;font-size:12px">${q}: <b>${usd2(v)}</b></span>`;
    });
  }
  document.getElementById('totales-bar').innerHTML=barH;
  document.getElementById('totales-bar').style.display='flex';
}

function renderAgrupado(por){
  if(!FILTRADOS.length){document.getElementById('tabla-container').innerHTML='<div class="loading">Sin resultados.</div>';return;}
  const grupos={};
  FILTRADOS.forEach(p=>{
    let key='';
    if(por==='mes')key=p.fecha?(p.fecha.substring(0,7)):'Sin fecha';
    else if(por==='metodo')key=p.metodo||'Sin método';
    else if(por==='quien')key=p.quien_recibio||'Sin asignar';
    else if(por==='edicion')key=p.alumnos?.ediciones?.nombre||'Sin edición';
    if(!grupos[key])grupos[key]=[];
    grupos[key].push(p);
  });

  const keys=Object.keys(grupos).sort((a,b)=>por==='mes'?b.localeCompare(a):a.localeCompare(b));
  let h='';
  const totGeneral=FILTRADOS.reduce((s,p)=>s+(p.monto||0),0);

  keys.forEach(key=>{
    const lista=grupos[key];
    const tot=lista.reduce((s,p)=>s+(p.monto||0),0);
    const label=por==='mes'?formatMes(key):key;
    const real=lista.filter(p=>p.realizado).length;

    h+=`<div class="grupo-header">
      <span><b>${label}</b> — ${lista.length} pagos · <b>${usd2(tot)}</b></span>
      <span style="font-size:11px">${real} realizados</span>
    </div>`;
    h+=`<table style="width:100%;border-collapse:collapse"><tbody>`;
    lista.forEach(p=>{
      h+=`<tr style="border-bottom:0.5px solid #f0f0e8">
        <td style="padding:8px 12px;color:#666;white-space:nowrap;width:100px">${p.fecha||'—'}</td>
        <td style="padding:8px 12px;font-weight:500">${p.alumnos?.nombre||'—'}</td>
        <td style="padding:8px 12px"><span class="pill pill-${metodoColor(p.metodo)}">${p.metodo||'—'}</span></td>
        <td style="padding:8px 12px;color:#666">${p.quien_recibio||'—'}</td>
        <td style="padding:8px 12px;font-size:11px;color:#aaa;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.notas||''}</td>
        <td style="padding:8px 12px;font-weight:500;color:#27500A;text-align:right">${usd2(p.monto)}</td>
        <td style="padding:8px 12px;text-align:center"><input type="checkbox" class="realizado-check" ${p.realizado?'checked':''} onchange="toggleRealizado('${p.id}',this.checked)"></td>
      </tr>`;
    });
    h+=`<tr style="background:#f8f8f5;font-weight:600">
      <td colspan="5" style="padding:7px 12px;font-size:12px;color:#888;text-align:right">Subtotal ${label}</td>
      <td style="padding:7px 12px;color:#27500A;text-align:right">${usd2(tot)}</td>
      <td></td>
    </tr>`;
    h+=`</tbody></table>`;
  });

  // Total general
  h+=`<div style="display:flex;justify-content:space-between;padding:12px 20px;font-size:14px;font-weight:600;background:#EAF3DE;border-top:1px solid #C0DD97">
    <span>TOTAL GENERAL — ${FILTRADOS.length} pagos</span>
    <span style="color:#004225">${usd2(totGeneral)}</span>
  </div>`;

  document.getElementById('tabla-container').innerHTML=h;
  document.getElementById('totales-bar').style.display='none';
}

function sortBy(col){
  if(sortCol===col)sortDir=sortDir==='asc'?'desc':'asc';
  else{sortCol=col;sortDir='asc';}
  filtrar();
}

async function toggleRealizado(pagoId,checked){
  const {error}=await db.from('pagos').update({realizado:checked}).eq('id',pagoId);
  if(error){alert('Error: '+error.message);return;}
  const p=TODOS.find(x=>x.id===pagoId);
  if(p)p.realizado=checked;
  actualizarMetricas();
}

function limpiarFiltros(){
  document.getElementById('f-alumno').value='';
  document.getElementById('f-metodo').value='';
  document.getElementById('f-quien').value='';
  document.getElementById('f-edicion').value='';
  document.getElementById('f-realizado').value='';
  document.getElementById('f-agrupar').value='';
  const hoy=new Date();
  const hace30=new Date(hoy);hace30.setDate(hace30.getDate()-30);
  document.getElementById('f-desde').value=hace30.toISOString().split('T')[0];
  document.getElementById('f-hasta').value=hoy.toISOString().split('T')[0];
  filtrar();
}

function exportarExcel(){
  const filas=FILTRADOS.map(p=>({
    'Fecha':p.fecha||'',
    'Alumno':p.alumnos?.nombre||'',
    'Edición':p.alumnos?.ediciones?.nombre||'',
    'Monto USD':p.monto||0,
    'Notas':p.notas||'',
    'Método':p.metodo||'',
    'Cuota':p.cuota||'',
    'Quién recibió':p.quien_recibio||'',
    'Realizado':p.realizado?'REALIZADO':'',
  }));

  const ws=XLSX.utils.json_to_sheet(filas);
  ws['!cols']=[{wch:12},{wch:30},{wch:14},{wch:12},{wch:30},{wch:14},{wch:8},{wch:14},{wch:12}];
  // Fila total
  XLSX.utils.sheet_add_json(ws,[{
    'Fecha':'','Alumno':'TOTAL','Edición':'',
    'Monto USD':FILTRADOS.reduce((s,p)=>s+(p.monto||0),0),
    'Notas':'','Método':'','Cuota':'','Quién recibió':'','Realizado':'',
  }],{skipHeader:true,origin:-1});

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Pagos');

  // Hoja resumen por método
  const porMetodo={};
  FILTRADOS.forEach(p=>{
    const m=p.metodo||'Otro';
    if(!porMetodo[m])porMetodo[m]={método:m,total:0,cantidad:0};
    porMetodo[m].total+=p.monto||0;
    porMetodo[m].cantidad++;
  });
  const ws2=XLSX.utils.json_to_sheet(
    Object.values(porMetodo).map(x=>({'Método':x.método,'Total USD':Math.round(x.total*100)/100,'Cantidad pagos':x.cantidad}))
  );
  XLSX.utils.book_append_sheet(wb,ws2,'Por método');

  // Hoja resumen por quién recibió
  const porQuien={};
  FILTRADOS.forEach(p=>{
    const q=p.quien_recibio||'Sin asignar';
    if(!porQuien[q])porQuien[q]={receptor:q,total:0,cantidad:0};
    porQuien[q].total+=p.monto||0;
    porQuien[q].cantidad++;
  });
  const ws3=XLSX.utils.json_to_sheet(
    Object.values(porQuien).map(x=>({'Quién recibió':x.receptor,'Total USD':Math.round(x.total*100)/100,'Cantidad pagos':x.cantidad}))
  );
  XLSX.utils.book_append_sheet(wb,ws3,'Por receptor');

  const fecha=new Date().toISOString().split('T')[0];
  XLSX.writeFile(wb,`TEB_pagos_${fecha}.xlsx`);
}

function exportarCSV(){
  const headers=['Fecha','Alumno','Edición','Monto USD','Notas','Método','Cuota','Quién recibió','Realizado'];
  const filas=FILTRADOS.map(p=>[
    p.fecha||'',
    `"${(p.alumnos?.nombre||'').replace(/"/g,'""')}"`,
    `"${(p.alumnos?.ediciones?.nombre||'')}"`,
    p.monto||0,
    `"${(p.notas||'').replace(/"/g,'""')}"`,
    p.metodo||'',
    p.cuota||'',
    p.quien_recibio||'',
    p.realizado?'REALIZADO':'',
  ]);
  const csv=[headers.join(','),...filas.map(r=>r.join(','))].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`TEB_pagos_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

init();
</script>
